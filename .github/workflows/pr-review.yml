name: PR Review Agent

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install GitAgent CLI
        run: npm install -g @open-gitagent/gitagent

      - name: Validate GitAgent standard
        run: gitagent validate || echo "⚠️ Validation warning — continuing"

  review:
    runs-on: ubuntu-latest
    needs: validate-agent
    permissions:
      pull-requests: write
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install google-genai requests pyyaml

      - name: Run PR Review Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/pr_review.py