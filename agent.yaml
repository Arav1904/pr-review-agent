name: pr-review-agent
version: "2.0.0"
description: >
  An AI agent that lives in your git repo and automatically reviews
  every Pull Request for bugs, security issues, style, and improvements.
  Posts structured reviews with health scores, auto-labels PRs, and
  updates existing comments instead of spamming new ones.

identity:
  soul: SOUL.md
  rules: RULES.md
  duties: DUTIES.md

model:
  default: gemini-2.0-flash-lite
  fallback: gemini-2.0-flash

skills:
  - path: skills/pr-review

tools:
  - path: tools/github-api.yaml

workflows:
  - path: workflows/review.yaml

features:
  - health_score: true
  - auto_labeling: true
  - comment_deduplication: true
  - per_file_breakdown: true

compliance:
  open_source: true
  license: MIT
  segregation_of_duties: true

metadata:
  author: your-github-username
  repo: https://github.com/your-username/pr-review-agent
  tags: [code-review, automation, github, pull-request, devtools, gitagent]