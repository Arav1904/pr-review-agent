name: github-api
description: Post comments to GitHub Pull Requests via REST API
type: http

actions:
  post_pr_comment:
    method: POST
    endpoint: "https://api.github.com/repos/{owner}/{repo}/issues/{pr_number}/comments"
    headers:
      Authorization: "Bearer {GITHUB_TOKEN}"
      Accept: "application/vnd.github+json"
    body:
      body: "{comment_text}"